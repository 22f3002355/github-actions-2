name: Daily Automated Commit

on:
  schedule:
    - cron: "30 6 * * *"   # once per day, fixed time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update file by 22f3002355@ds.study.iitm.ac.in
        run: |
          echo "Daily update run on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "22f3002355@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit" || echo "Nothing to commit"
          git push
